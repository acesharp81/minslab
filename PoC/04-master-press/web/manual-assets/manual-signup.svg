<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650"><rect width="1180" height="650" rx="30" fill="#eef5f1"/><text x="46" y="58" font-family="Arial" font-size="26" font-weight="800" fill="#0e3026">구독 및 케이스 신청 화면</text><rect x="46" y="96" width="1088" height="250" rx="24" fill="#fff" stroke="#d5e0da"/><text x="76" y="134" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">구독 신청</text><g font-family="Arial"><rect x="76" y="160" width="298" height="150" rx="18" fill="#f8fbf9" stroke="#d5e0da"/><text x="100" y="194" font-size="15" font-weight="800" fill="#176348">1. 카카오 전송</text><rect x="100" y="218" width="230" height="34" rx="10" fill="#12352a"/><text x="124" y="240" font-size="13" fill="#fff">카카오 로그인/메시지 동의</text><text x="100" y="276" font-size="12" fill="#c43a31">[선택] 메시지 전송 동의 필수</text><rect x="400" y="160" width="228" height="150" rx="18" fill="#f8fbf9" stroke="#d5e0da"/><text x="424" y="194" font-size="15" font-weight="800" fill="#176348">2. 이름·기관</text><rect x="424" y="218" width="160" height="30" rx="8" fill="#fff" stroke="#cad8d0"/><text x="438" y="238" font-size="12" fill="#7a8881">이름 입력</text><rect x="424" y="258" width="160" height="30" rx="8" fill="#fff" stroke="#cad8d0"/><text x="438" y="278" font-size="12" fill="#7a8881">기관 선택</text><rect x="654" y="160" width="450" height="150" rx="18" fill="#f8fbf9" stroke="#d5e0da"/><text x="678" y="194" font-size="15" font-weight="800" fill="#176348">3. 구독 대상 선택</text><rect x="678" y="214" width="180" height="28" rx="8" fill="#fff" stroke="#cad8d0"/><text x="704" y="233" font-size="12" fill="#0e3026">□ 행안부 언론 동향 ?</text><rect x="878" y="214" width="180" height="28" rx="8" fill="#fff" stroke="#cad8d0"/><text x="904" y="233" font-size="12" fill="#0e3026">□ AI 관련 기사 ?</text><rect x="678" y="256" width="380" height="34" rx="10" fill="#fff4f2" stroke="#efc8c2"/><text x="696" y="278" font-size="12" fill="#c43a31">여러 케이스 구독 시 메시지가 많아질 수 있습니다.</text></g><rect x="46" y="382" width="1088" height="218" rx="24" fill="#fff" stroke="#d5e0da"/><text x="76" y="420" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">케이스 신청 게시판</text><rect x="76" y="446" width="410" height="124" rx="16" fill="#f8fbf9" stroke="#d5e0da"/><text x="100" y="478" font-family="Arial" font-size="13" font-weight="800" fill="#176348">닉네임 + 암호 + 케이스 프롬프트 입력</text><text x="100" y="506" font-family="Arial" font-size="12" fill="#52635b">암호는 수정·삭제용, 평문 저장 안 함</text><text x="100" y="532" font-family="Arial" font-size="12" fill="#52635b">등록/수정 시 클린 AI 검사 대기</text><rect x="526" y="446" width="560" height="124" rx="16" fill="#f8fbf9" stroke="#d5e0da"/><text x="550" y="478" font-family="Arial" font-size="13" font-weight="800" fill="#176348">게시판 목록</text><text x="550" y="506" font-family="Arial" font-size="12" fill="#52635b">제목·닉네임만 먼저 표시하고 클릭 시 상세 확장</text><text x="550" y="532" font-family="Arial" font-size="12" fill="#52635b">문제 글은 “클린 AI” 블라인드 처리</text></svg>