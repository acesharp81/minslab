<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650"><rect width="1180" height="650" rx="30" fill="#eef5f1"/><text x="46" y="58" font-family="Arial" font-size="26" font-weight="800" fill="#0e3026">관리 설정 핵심 구조</text><rect x="46" y="96" width="520" height="210" rx="24" fill="#fff" stroke="#d5e0da"/><text x="76" y="134" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">회원 관리 2열 리스트</text><rect x="76" y="160" width="210" height="48" rx="12" fill="#f8fbf9" stroke="#d5e0da"/><text x="94" y="190" font-family="Arial" font-size="12" fill="#0e3026">김** · 2 승인요청</text><rect x="306" y="160" width="210" height="48" rx="12" fill="#f8fbf9" stroke="#d5e0da"/><text x="324" y="190" font-family="Arial" font-size="12" fill="#0e3026">박** · 8 승인완료</text><rect x="76" y="226" width="440" height="44" rx="12" fill="#fff4f2" stroke="#efc8c2"/><text x="96" y="254" font-family="Arial" font-size="12" fill="#c43a31">이름 표시 체크 시 전체 이름 표시</text><rect x="614" y="96" width="520" height="210" rx="24" fill="#fff" stroke="#d5e0da"/><text x="644" y="134" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">모델 설정 순차 로딩</text><text x="644" y="174" font-family="Arial" font-size="13" fill="#52635b">공통분석 → 케이스 판정 → 예비1 → 예비2 → 임베딩</text><text x="644" y="208" font-family="Arial" font-size="13" fill="#52635b">저장값 먼저 표시, 확인되는 것부터 하나씩 갱신</text><text x="644" y="242" font-family="Arial" font-size="13" fill="#52635b">대시보드에는 토큰 숫자 숨김</text><rect x="46" y="348" width="520" height="210" rx="24" fill="#fff" stroke="#d5e0da"/><text x="76" y="386" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">기관과 케이스</text><text x="76" y="426" font-family="Arial" font-size="13" fill="#52635b">기관 아래 케이스를 드래그해 표시 순서 변경</text><text x="76" y="460" font-family="Arial" font-size="13" fill="#52635b">구독 화면, 대시보드, 신경망 선택 순서에 반영</text><text x="76" y="494" font-family="Arial" font-size="13" fill="#52635b">케이스별 구독자 수와 발송 기준 확인</text><rect x="614" y="348" width="520" height="210" rx="24" fill="#fff" stroke="#d5e0da"/><text x="644" y="386" font-family="Arial" font-size="18" font-weight="800" fill="#0e3026">공지사항</text><text x="644" y="426" font-family="Arial" font-size="13" fill="#52635b">왼쪽은 새 공지 등록, 오른쪽은 게시중/전체 탭</text><text x="644" y="460" font-family="Arial" font-size="13" fill="#52635b">내리기: 팝업 중단, 삭제: DB 완전 삭제</text><text x="644" y="494" font-family="Arial" font-size="13" fill="#52635b">사용자는 일주일 동안 다시 보지 않기 가능</text></svg>